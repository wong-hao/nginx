events {}

http {

    # ==============================
    # ❌ 禁止所有 HTTP（80）
    # ==============================
    server {
        listen 80 default_server;
        server_name _;

        return 403;
    }

    # ==============================
    # ✅ HTTPS 主入口（唯一入口）
    # ==============================
    server {
        listen 443 ssl http2;
        server_name aigateway.cdut.edu.cn;

        ssl_certificate     /etc/nginx/certs/cdut.edu.cn.pem;
        ssl_certificate_key /etc/nginx/certs/cdut.edu.cn.key;

        # 🔐 TLS 安全配置
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # 🔐 HSTS（强制浏览器以后只走 HTTPS）
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ==============================
        # 反向代理 LiteLLM（全部路径放行）
        # ==============================
        location / {
            proxy_pass http://litellm:4000;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # WebSocket 支持（LiteLLM UI 需要）
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
