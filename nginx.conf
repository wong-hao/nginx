events {}

http {

    # ==========================================
    # WebSocket / Streaming
    # ==========================================
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }


    # ==========================================
    # HTTP 禁止访问
    # ==========================================
    server {

        listen 80 default_server;
        server_name _;

        return 403;
    }



    # ==================================================
    # LiteLLM Gateway
    # https://aigateway.cdut.edu.cn
    # ==================================================
    server {

        listen 443 ssl;
        http2 on;

        server_name aigateway.cdut.edu.cn;


        ssl_certificate     /etc/nginx/certs/cdut.edu.cn.pem;
        ssl_certificate_key /etc/nginx/certs/cdut.edu.cn.key;


        ssl_protocols TLSv1.2 TLSv1.3;



        location / {


            proxy_pass http://litellm:4000;


            # ===============================
            # 请求头
            # ===============================

            proxy_set_header Host $host;

            proxy_set_header X-Real-IP $remote_addr;

            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_set_header X-Forwarded-Proto https;

            proxy_set_header Authorization $http_authorization;



            # ===============================
            # HTTP/1.1
            # ===============================

            proxy_http_version 1.1;



            # ===============================
            # Streaming / WebSocket
            # ===============================

            proxy_set_header Upgrade $http_upgrade;

            proxy_set_header Connection $connection_upgrade;



            # ===============================
            # OpenAI API
            # ===============================

            # 请求完整读取后发送给 LiteLLM
            proxy_request_buffering on;


            # SSE 流式输出
            proxy_buffering off;



            # ===============================
            # 超时
            # ===============================

            proxy_connect_timeout 60s;

            proxy_send_timeout 600s;

            proxy_read_timeout 600s;



            # ===============================
            # 长上下文/RAG支持
            # ===============================

            client_max_body_size 100m;


        }

    }






    # ==================================================
    # New API
    # https://mmaigateway.cdut.edu.cn
    # ==================================================
    server {


        listen 443 ssl;

        http2 on;


        server_name mmaigateway.cdut.edu.cn;



        ssl_certificate     /etc/nginx/certs/cdut.edu.cn.pem;

        ssl_certificate_key /etc/nginx/certs/cdut.edu.cn.key;



        ssl_protocols TLSv1.2 TLSv1.3;



        location / {


            proxy_pass http://new-api:3000;



            # ===============================
            # 请求头
            # ===============================

            proxy_set_header Host $host;

            proxy_set_header X-Real-IP $remote_addr;

            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_set_header X-Forwarded-Proto https;



            # ===============================
            # HTTP/1.1
            # ===============================

            proxy_http_version 1.1;



            # ===============================
            # WebSocket
            # ===============================

            proxy_set_header Upgrade $http_upgrade;

            proxy_set_header Connection $connection_upgrade;



            # ===============================
            # 请求处理
            # ===============================

            proxy_request_buffering on;

            proxy_buffering off;



            # ===============================
            # 超时
            # ===============================

            proxy_connect_timeout 60s;

            proxy_send_timeout 600s;

            proxy_read_timeout 600s;



            client_max_body_size 100m;


        }

    }

}