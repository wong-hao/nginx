events {}

http {

    # ==============================
    # 禁止 HTTP
    # ==============================
    server {
        listen 80 default_server;
        server_name _;

        return 403;
    }

    # ==============================
    # HTTPS 主入口
    # ==============================
    server {

        listen 443 ssl;
        http2 on;

        server_name aigateway.cdut.edu.cn;

        ssl_certificate     /etc/nginx/certs/cdut.edu.cn.pem;
        ssl_certificate_key /etc/nginx/certs/cdut.edu.cn.key;

        # TLS
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # HSTS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ==================================================
        # New API
        # https://aigateway.cdut.edu.cn/new-api/
        # ==================================================
        location /new-api/ {

            proxy_pass http://new-api:3000/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ==================================================
        # LiteLLM
        # https://aigateway.cdut.edu.cn/
        # ==================================================
        location / {

            proxy_pass http://litellm:4000;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_set_header Authorization $http_authorization;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
