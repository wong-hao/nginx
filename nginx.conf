events {}

http {

    # ==============================
    # HTTP 禁止
    # ==============================
    server {
        listen 80 default_server;
        server_name _;

        return 403;
    }

    # ==================================================
    # LiteLLM
    # https://aigateway.cdut.edu.cn
    # ==================================================
    server {

        listen 443 ssl;
        http2 on;

        server_name aigateway.cdut.edu.cn;

        ssl_certificate     /etc/nginx/certs/cdut.edu.cn.pem;
        ssl_certificate_key /etc/nginx/certs/cdut.edu.cn.key;

        ssl_protocols TLSv1.2 TLSv1.3;

        location / {

            proxy_pass http://litellm:4000;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;

            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }

    # ==================================================
    # New API
    # https://mmaigateway.cdut.edu.cn
    # ==================================================
    server {

        listen 443 ssl;
        http2 on;

        server_name mmaigateway.cdut.edu.cn;

        ssl_certificate     /etc/nginx/certs/cdut.edu.cn.pem;
        ssl_certificate_key /etc/nginx/certs/cdut.edu.cn.key;

        ssl_protocols TLSv1.2 TLSv1.3;

        location / {

            proxy_pass http://new-api:3000;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}