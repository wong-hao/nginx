events {}

http {
    
    # 定义连接升级映射（用于 WebSocket/流式）
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ==============================
    # HTTP 禁止
    # ==============================
    server {
        listen 80 default_server;
        server_name _;

        return 403;
    }

    # ==================================================
    # LiteLLM
    # https://aigateway.cdut.edu.cn
    # ==================================================
    server {

        listen 443 ssl;
        http2 on;

        server_name aigateway.cdut.edu.cn;

        ssl_certificate     /etc/nginx/certs/cdut.edu.cn.pem;
        ssl_certificate_key /etc/nginx/certs/cdut.edu.cn.key;

        ssl_protocols TLSv1.2 TLSv1.3;

        location / {

            proxy_pass http://litellm:4000;

            # === 基本代理头 ===
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;

            # === HTTP/1.1 支持 ===
            proxy_http_version 1.1;

            # === WebSocket/流式支持 ===
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # === 关键修复：防止请求/响应头冲突 ===
            proxy_request_buffering off;
            proxy_buffering off;
            proxy_hide_header Content-Length;

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }

    # ==================================================
    # New API
    # https://mmaigateway.cdut.edu.cn
    # ==================================================
    server {

        listen 443 ssl;
        http2 on;

        server_name mmaigateway.cdut.edu.cn;

        ssl_certificate     /etc/nginx/certs/cdut.edu.cn.pem;
        ssl_certificate_key /etc/nginx/certs/cdut.edu.cn.key;

        ssl_protocols TLSv1.2 TLSv1.3;

        location / {

            proxy_pass http://new-api:3000;

            # === 基本代理头 ===
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # === HTTP/1.1 支持 ===
            proxy_http_version 1.1;

            # === WebSocket/流式支持 ===
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # === 同样应用修复：防止请求/响应头冲突 ===
            proxy_request_buffering off;
            proxy_buffering off;
            proxy_hide_header Content-Length;

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}